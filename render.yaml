services:
  - type: web
    name: stemsplit
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --timeout 600 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: audio-data
      mountPath: /opt/render/project/src
      sizeGB: 10
